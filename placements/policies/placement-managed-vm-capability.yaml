---
# VM-specific policies and MCRAs (kubevirt, AAQ when CRD present) target only
# clusters labelled tenancy.acm.io/capability-vm=true.
apiVersion: cluster.open-cluster-management.io/v1beta1
kind: Placement
metadata:
  name: policies-placement-managed-vm-clusters
  namespace: policies
spec:
  predicates:
    - requiredClusterSelector:
        labelSelector:
          matchLabels:
            tenancy.acm.io/capability-vm: "true"
  tolerations:
    - key: cluster.open-cluster-management.io/unavailable
      operator: Exists
    - key: cluster.open-cluster-management.io/unreachable
      operator: Exists
