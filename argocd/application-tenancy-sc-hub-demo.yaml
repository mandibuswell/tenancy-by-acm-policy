---
# Optional — enable for workshop clusters with keycloak-system franchise SSO demos.
# Production hubs using external OIDC or customer Keycloak do not need this Application.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenancy-sc-hub-demo
  namespace: openshift-gitops
spec:
  destination:
    namespace: policies
    server: https://kubernetes.default.svc
  project: tenancy-policy
  source:
    path: policygen/SC-System-and-Communications-Protection/demo
    repoURL: https://github.com/ngner/tenancy-by-acm-policy.git
    targetRevision: master
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    automated:
      prune: true
      selfHeal: true
