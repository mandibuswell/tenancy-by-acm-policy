object-templates-raw: |
  {{- range $tenant := (lookup "dusty-seahorse.io/v1alpha1" "Tenant" "tenancies" "").items }}
  {{- $tenantName := $tenant.metadata.name }}
  - complianceType: mustonlyhave
    metadataComplianceType: musthave
    objectDefinition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: {{ $tenantName }}-tenant-admin-acm-fleet
        labels:
          tenant: {{ $tenantName | quote }}
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: acm-vm-fleet:view
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: {{ $tenant.spec.adminGroup }}
  - complianceType: mustonlyhave
    metadataComplianceType: musthave
    objectDefinition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: {{ $tenantName }}-tenant-user-acm-fleet
        labels:
          tenant: {{ $tenantName | quote }}
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: acm-vm-fleet:view
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: {{ $tenant.spec.userGroup }}
  {{- if $tenant.spec.viewerGroup }}
  - complianceType: mustonlyhave
    metadataComplianceType: musthave
    objectDefinition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: ClusterRoleBinding
      metadata:
        name: {{ $tenantName }}-tenant-viewer-acm-fleet
        labels:
          tenant: {{ $tenantName | quote }}
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: acm-vm-fleet:view
      subjects:
        - kind: Group
          apiGroup: rbac.authorization.k8s.io
          name: {{ $tenant.spec.viewerGroup }}
  {{- end }}
  {{- end }}
