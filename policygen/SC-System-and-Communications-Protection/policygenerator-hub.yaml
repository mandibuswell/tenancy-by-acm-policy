---
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: tenancy-sc-hub
placementBindingDefaults:
  name: binding-tenancy-hub-sc
policyDefaults:
  namespace: tenancies
  policySets:
    - tenancy-hub-tenant-definition
  categories:
    - SC System and Communications Protection
  controls:
    - Establish Tenant Isolation Boundary
  standards:
    - Multi-Tenant Isolation
  severity: high
  remediationAction: enforce
  consolidateManifests: false
  orderManifests: false

policies:
  - name: tenancy-hub-tenant-crd
    complianceType: mustonlyhave
    controls:
      - Hub create tenant CRD
    manifests:
      - path: tenancy/tenant-crd.yaml
      - path: tenancy/tenancies-namespace.yaml

  - name: tenancy-hub-keycloak-realms
    controls:
      - Provision Tenant Keycloak Realms (opt-in manageRealm only)
    dependencies:
      - name: tenancy-hub-tenant-crd
    # Remove KeycloakRealmImport CRs when the Tenant CR is deleted.
    pruneObjectBehavior: DeleteAll
    manifests:
      - path: keycloak/realm-import-from-crd.yaml

  - name: tenancy-hub-identity-reconciler
    controls:
      - Register Tenant OpenShift OAuth IdPs
    dependencies:
      - name: tenancy-hub-tenant-crd
    manifests:
      - path: keycloak/identity-reconciler.yaml

policySets:
  - name: tenancy-hub-tenant-definition
    description: "Hub Tenant CRD and tenancies namespace -- foundation for all tenant policies"
    placement:
      placementName: tenancies-placement-hub-clusters
