---
# Optional demo policies — enable via argocd/application-tenancy-sc-hub-demo.yaml.
# Not required for production multi-tenant hubs (external IdP or customer-owned Keycloak).
apiVersion: policy.open-cluster-management.io/v1
kind: PolicyGenerator
metadata:
  name: tenancy-sc-hub-demo
placementBindingDefaults:
  name: binding-tenancy-hub-sc-demo
policyDefaults:
  namespace: tenancies
  policySets:
    - tenancy-hub-demo
  categories:
    - SC System and Communications Protection
  controls:
    - Demo Keycloak Realms and Themes
  standards:
    - Multi-Tenant Isolation
  severity: medium
  remediationAction: enforce
  consolidateManifests: false
  orderManifests: false

policies:
  - name: tenancy-hub-keycloak-legacy-demo-realms
    controls:
      - Demo Keycloak realms for legacy franchise tenants
    dependencies:
      - name: tenancy-hub-tenant-crd
        compliance: Compliant
    pruneObjectBehavior: DeleteAll
    manifests:
      - path: ../keycloak/realm-import-legacy-demo.yaml

policySets:
  - name: tenancy-hub-demo
    description: >-
      Workshop-only Keycloak realms for tenants without spec.identity (starwars, startrek, etc.).
      Custom CSS themes remain outside policy — use apply-themes.sh in demo-setups.
    placement:
      placementName: tenancies-placement-hub-clusters
