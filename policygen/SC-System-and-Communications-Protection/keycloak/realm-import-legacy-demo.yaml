# Demo-only: Keycloak realms for Tenant CRs WITHOUT spec.identity (franchise SSO workshops).
# Enable via the optional Argo app tenancy-sc-hub-demo — not part of production hub policy.
object-templates-raw: |
  {{- range $tenant := (lookup "dusty-seahorse.io/v1alpha1" "Tenant" "tenancies" "").items }}
  {{- if not $tenant.spec.identity }}
  {{- $name := $tenant.metadata.name }}
  {{- $domain := (lookup "config.openshift.io/v1" "Ingress" "" "cluster").spec.domain }}
  {{- $kcNs := "keycloak-system" }}
  {{- $kcCr := "main" }}
  {{- $realm := $name }}
  {{- $loginTheme := $realm }}
  {{- if eq $realm "battlestar" }}{{ $loginTheme = "bsg" }}{{- end }}
  {{- $secretName := printf "%s-client-secret" $name }}
  {{- $clientSecret := "VDRjA2vWjJwlSZQ9tickuGkBQpiiJHdN" }}
  {{- $secret := lookup "v1" "Secret" "openshift-config" $secretName }}
  {{- if $secret }}{{ $clientSecret = ($secret.data.clientSecret | b64dec) }}{{- end }}
  - complianceType: musthave
    objectDefinition:
      apiVersion: k8s.keycloak.org/v2alpha1
      kind: KeycloakRealmImport
      metadata:
        name: {{ $name }}-realm-import
        namespace: {{ $kcNs }}
      spec:
        keycloakCRName: {{ $kcCr }}
        realm:
          id: {{ $realm }}
          realm: {{ $realm }}
          enabled: true
          loginTheme: {{ $loginTheme }}
          groups:
            - name: {{ $tenant.spec.adminGroup }}
              path: /{{ $tenant.spec.adminGroup }}
              realmRoles:
                - {{ $tenant.spec.adminGroup }}
            - name: {{ $tenant.spec.userGroup }}
              path: /{{ $tenant.spec.userGroup }}
              realmRoles:
                - {{ $tenant.spec.userGroup }}
            {{- if $tenant.spec.viewerGroup }}
            - name: {{ $tenant.spec.viewerGroup }}
              path: /{{ $tenant.spec.viewerGroup }}
              realmRoles:
                - {{ $tenant.spec.viewerGroup }}
            {{- end }}
          roles:
            realm:
              - name: {{ $tenant.spec.adminGroup }}
              - name: {{ $tenant.spec.userGroup }}
              {{- if $tenant.spec.viewerGroup }}
              - name: {{ $tenant.spec.viewerGroup }}
              {{- end }}
          users:
            - username: admin@{{ $name }}.local
              enabled: true
              firstName: Admin
              lastName: Default
              groups:
                - /{{ $tenant.spec.adminGroup }}
              credentials:
                - type: password
                  value: password
                  temporary: false
            - username: user@{{ $name }}.local
              enabled: true
              firstName: User
              lastName: Default
              groups:
                - /{{ $tenant.spec.userGroup }}
              credentials:
                - type: password
                  value: password
                  temporary: false
            {{- if $tenant.spec.viewerGroup }}
            - username: viewer@{{ $name }}.local
              enabled: true
              firstName: Viewer
              lastName: Default
              groups:
                - /{{ $tenant.spec.viewerGroup }}
              credentials:
                - type: password
                  value: password
                  temporary: false
            {{- end }}
          clients:
            - clientId: openshift-{{ $name }}
              secret: {{ $clientSecret }}
              enabled: true
              directAccessGrantsEnabled: true
              standardFlowEnabled: true
              redirectUris:
                - "https://oauth-openshift.{{ $domain }}/oauth2callback/{{ $name }}-idp"
                - "https://console-openshift-console.{{ $domain }}/*"
              protocolMappers:
                - name: groups
                  protocol: openid-connect
                  protocolMapper: oidc-group-membership-mapper
                  consentRequired: false
                  config:
                    claim.name: groups
                    full.path: "false"
                    id.token.claim: "true"
                    access.token.claim: "true"
                    userinfo.token.claim: "true"
  {{- end }}
  {{- end }}
