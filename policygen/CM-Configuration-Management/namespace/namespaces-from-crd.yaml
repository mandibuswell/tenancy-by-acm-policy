object-templates-raw: |
  {{- range $tenant := (lookup "dusty-seahorse.io/v1alpha1" "Tenant" "tenancies" "").items }}
  {{- $profile := $tenant.spec.workloadProfile | default "vms" }}
  {{- if or (eq $profile "containers") (eq $profile "both") }}
  {{- $tenantName := $tenant.metadata.name }}
  {{- $workloadNs := $tenant.spec.workloadNamespace | default $tenantName }}
  - complianceType: musthave
    metadataComplianceType: musthave
    objectDefinition:
      kind: Namespace
      apiVersion: v1
      metadata:
        name: {{ $workloadNs }}
        labels:
          tenant: {{ $tenantName | quote }}
          customer-namespace: ""
          k8s.ovn.org/primary-user-defined-network: ""
  {{- end }}
  {{- end }}
