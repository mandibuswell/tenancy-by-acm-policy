apiVersion: operator.openshift.io/v1
kind: Console
metadata:
  name: cluster
spec:
  managementState: Managed
  customization:
    perspectives:
      # 1. Hide Administrator from tenants (only users who can list clusteroperators will see it)
      - id: admin
        visibility:
          accessReview:
            required:
              - group: config.openshift.io
                resource: clusteroperators
                verb: list
          state: AccessReview
          
      # 2. Explicitly disable Developer perspective (even though 4.19+ disables by default)
      - id: dev
        visibility:
          state: Disabled
          
      # 3. Hub-local Virtualization perspective — platform admins only.
      #    Tenant workloads run on managed clusters; tenants use the ACM fleet view instead.
      - id: virtualization-perspective
        visibility:
          accessReview:
            required:
              - group: config.openshift.io
                resource: clusteroperators
                verb: list
          state: AccessReview
          
      # 4. ACM Fleet Management — visible to tenant groups with acm-vm-fleet:view
      #    (managedclusters list), not cluster-admin clusteroperators access.
      - id: acm
        visibility:
          accessReview:
            required:
              - group: cluster.open-cluster-management.io
                resource: managedclusters
                verb: list
          state: AccessReview