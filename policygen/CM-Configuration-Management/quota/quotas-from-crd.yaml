object-templates-raw: |
  {{- $aaqCrd := (lookup "apiextensions.k8s.io/v1" "CustomResourceDefinition" "" "applicationawareresourcequotas.aaq.kubevirt.io") }}
  {{- range $tenant := (lookup "dusty-seahorse.io/v1alpha1" "Tenant" "tenancies" "").items }}
  {{- $tenantName := $tenant.metadata.name }}
  {{- $workloadNs := $tenant.spec.workloadNamespace | default $tenantName }}
  {{- $rq := $tenant.spec.resourceQuota | default dict }}
  {{- $vq := $tenant.spec.vmQuota | default dict }}
  {{- $lr := $tenant.spec.limitRange | default dict }}
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: v1
      kind: ResourceQuota
      metadata:
        name: {{ $tenantName }}-resource-quota
        namespace: {{ $workloadNs }}
        labels:
          tenant: {{ $tenantName | quote }}
      spec:
        hard:
          requests.cpu: "{{ $rq.cpu | default "86" }}"
          requests.memory: "{{ $rq.memory | default "332Gi" }}"
          pods: "{{ $rq.pods | default "15" }}"
          requests.storage: "{{ $rq.storage | default "2000Gi" }}"
  {{- if $aaqCrd }}
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: aaq.kubevirt.io/v1alpha1
      kind: ApplicationAwareResourceQuota
      metadata:
        name: {{ $tenantName }}-vm-resource-quota
        namespace: {{ $workloadNs }}
        labels:
          tenant: {{ $tenantName | quote }}
      spec:
        hard:
          requests.cpu/vmi: "{{ $vq.cpu | default "80" }}"
          requests.memory/vmi: "{{ $vq.memory | default "320Gi" }}"
          limits.cpu/vmi: "{{ $vq.cpu | default "80" }}"
          limits.memory/vmi: "{{ $vq.memory | default "320Gi" }}"
  {{- end }}
  - complianceType: mustonlyhave
    objectDefinition:
      apiVersion: v1
      kind: LimitRange
      metadata:
        name: {{ $tenantName }}-limit-range
        namespace: {{ $workloadNs }}
        labels:
          tenant: {{ $tenantName | quote }}
      spec:
        limits:
          - type: Container
            max:
              cpu: "{{ $lr.maxCpu | default "32" }}"
              memory: "{{ $lr.maxMemory | default "128Gi" }}"
          - type: PersistentVolumeClaim
            max:
              storage: "{{ $lr.maxStorage | default "1Ti" }}"
  {{- end }}
