object-templates-raw: |
  {{- range $tenant := (lookup "dusty-seahorse.io/v1alpha1" "Tenant" "tenancies" "").items }}
  {{- $tenantName := $tenant.metadata.name }}
  {{- $net := $tenant.spec.network | default dict }}
  {{- $mlb := $net.metallb | default dict }}
  {{- if $mlb.peerASN }}
  - complianceType: mustonlyhave
    metadataComplianceType: musthave
    objectDefinition:
      apiVersion: metallb.io/v1beta1
      kind: BGPAdvertisement
      metadata:
        name: {{ $tenantName }}-bgp-advertisement
        namespace: metallb-system
        labels:
          tenant: {{ $tenantName | quote }}
      spec:
        ipAddressPools:
          - {{ $tenantName }}-ip-pool
        peers:
          - {{ $tenantName }}-bgp-peer
  {{- end }}
  {{- end }}
